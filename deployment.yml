apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app-deployment
spec:
  selector:
    matchLabels:
      app: weather-app
  replicas: 2 # tells deployment to run 2 pods matching the template
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
      - name: weather-app
        image: 310179635/weather_app_img
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: weather-app-service
  labels: 
    app: weather-app
spec:
  type: LoadBalancer
  selector:
    app: weather-app
  ports:
    - nodePort: 32222 
      port: 80
      targetPort: 5000
